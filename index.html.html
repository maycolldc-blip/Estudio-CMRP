<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CMRP">
<title>CMRP — Preparación</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;
  --text:#e8edf8;--muted:#64748b;--accent:#3b82f6;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --p1:#f0a500;--p2:#3d7fff;--p3:#00c896;--p4:#c47aff;--p5:#ff6b6b;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.5;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}
.topbar{padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:52px;}
.topbar-back{background:none;border:none;color:var(--muted);font-size:1.2rem;
  cursor:pointer;padding:4px 8px 4px 0;display:none;}
.topbar-title{font-size:0.95rem;font-weight:600;flex:1;}
.topbar-badge{font-family:'Fira Mono',monospace;font-size:0.6rem;
  background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);
  color:var(--accent);padding:3px 9px;border-radius:20px;white-space:nowrap;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px;}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:5px 0;cursor:pointer;color:var(--muted);}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:1.25rem;}
.nav-label{font-size:0.58rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;}
.screen{display:none;padding:16px;}
.screen.active{display:block;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* HOME */
.hero{padding:18px 0 14px;text-align:center;}
.hero-tag{font-family:'Fira Mono',monospace;font-size:0.6rem;color:var(--accent);
  letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;}
.hero h1{font-size:1.65rem;font-weight:700;line-height:1.15;margin-bottom:6px;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:0.82rem;}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.sum-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;}
.sum-val{font-size:1.2rem;font-weight:700;}
.sum-lbl{font-size:0.6rem;color:var(--muted);margin-top:2px;}
.sec-label{font-family:'Fira Mono',monospace;font-size:0.62rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.pilar-list{display:flex;flex-direction:column;gap:8px;}
.pc{background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--color);border-radius:var(--r);
  padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.pc:active{transform:scale(0.98);}
.pc-info{flex:1;min-width:0;}
.pc-name{font-weight:600;font-size:0.88rem;margin-bottom:2px;}
.pc-meta{font-family:'Fira Mono',monospace;font-size:0.62rem;color:var(--muted);}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.pc-pct{font-family:'Fira Mono',monospace;font-size:0.72rem;font-weight:600;color:var(--color);}
.mbar{width:52px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:2px;background:var(--color);}
.btn-main{width:100%;margin-top:14px;padding:13px;border:none;border-radius:var(--r);
  background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;
  font-size:0.9rem;font-weight:600;cursor:pointer;}
.btn-main:active{transform:scale(0.97);}
/* MODE TABS */
.mode-tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;
  padding:4px;margin-bottom:16px;}
.mode-tab{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:500;
  background:transparent;color:var(--muted);}
.mode-tab.active{background:var(--accent);color:#fff;}
/* MENU LIST */
.menu-list{display:flex;flex-direction:column;gap:8px;}
.mc{background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--color);border-radius:var(--r);
  padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.mc:active{transform:scale(0.98);}
.mc-dot{width:8px;height:8px;border-radius:50%;background:var(--color);flex-shrink:0;}
.mc-info{flex:1;}
.mc-name{font-weight:600;font-size:0.88rem;}
.mc-sub{font-size:0.72rem;color:var(--muted);}
/* PILAR HEADER */
.ph{margin-bottom:14px;}
.ph-tag{font-family:'Fira Mono',monospace;font-size:0.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.ph-title{font-size:1.15rem;font-weight:700;}
.ph-desc{font-size:0.82rem;color:var(--muted);line-height:1.55;margin-top:6px;}
/* TEMAS */
.tema{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.tema-h{padding:12px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;}
.tema-h:active{background:var(--surface2);}
.tema-code{font-family:'Fira Mono',monospace;font-size:0.65rem;
  background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:4px;flex-shrink:0;}
.tema-title{font-size:0.88rem;font-weight:600;flex:1;}
.tema-arr{color:var(--muted);font-size:0.7rem;transition:transform 0.2s;flex-shrink:0;}
.tema.open .tema-arr{transform:rotate(180deg);}
.tema-body{display:none;padding:0 14px 14px;}
.tema.open .tema-body{display:block;}
/* SUBTEMAS */
.sub{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
  overflow:hidden;background:var(--bg);}
.sub-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;}
.sub-arr{color:var(--accent);font-size:0.65rem;transition:transform 0.2s;flex-shrink:0;}
.sub.open .sub-arr{transform:rotate(90deg);}
.sub-title{font-size:0.84rem;font-weight:500;flex:1;}
.sub-body{display:none;padding:0 12px 12px;}
.sub.open .sub-body{display:block;animation:fadeIn 0.2s ease;}
.ctext{font-size:0.83rem;color:var(--muted);line-height:1.65;margin-bottom:12px;}
.ctext strong{color:var(--text);}
.fbox{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);
  border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.flabel{font-family:'Fira Mono',monospace;font-size:0.58rem;color:var(--accent);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.ftext{font-family:'Fira Mono',monospace;font-size:0.78rem;color:var(--text);
  line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.ebox{background:rgba(0,200,150,0.06);border:1px solid rgba(0,200,150,0.2);
  border-radius:8px;padding:10px 12px;}
.elabel{font-family:'Fira Mono',monospace;font-size:0.58rem;color:var(--green);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.etext{font-size:0.8rem;color:var(--muted);line-height:1.7;
  white-space:pre-wrap;word-break:break-word;}
.etext strong{color:var(--green);}
/* QUIZ */
.qhdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.btn-bk{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:5px 11px;color:var(--muted);font-size:0.78rem;cursor:pointer;white-space:nowrap;}
.qpw{flex:1;}
.qbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.qbar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.3s;}
.qcnt{font-family:'Fira Mono',monospace;font-size:0.6rem;color:var(--muted);
  text-align:right;margin-top:3px;}
.qtag{display:inline-block;font-family:'Fira Mono',monospace;font-size:0.62rem;
  padding:2px 9px;border-radius:20px;margin-bottom:10px;
  background:rgba(255,255,255,0.05);color:var(--muted);}
.qtext{font-size:0.93rem;font-weight:500;line-height:1.6;margin-bottom:18px;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qopt{background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 13px;cursor:pointer;
  display:flex;align-items:flex-start;gap:9px;
  font-size:0.86rem;line-height:1.5;}
.qopt:active:not(.dis){transform:scale(0.98);}
.qopt.ok{border-color:var(--green);background:rgba(16,185,129,0.1);}
.qopt.fail{border-color:var(--red);background:rgba(239,68,68,0.1);}
.qopt.rev{border-color:var(--green);background:rgba(16,185,129,0.07);}
.qopt.dis{cursor:default;}
.ol{font-family:'Fira Mono',monospace;font-size:0.7rem;min-width:20px;height:20px;
  border-radius:5px;background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.qopt.ok .ol{background:var(--green);color:#000;}
.qopt.fail .ol{background:var(--red);color:#fff;}
.qopt.rev .ol{background:var(--green);color:#000;}
.qexp{margin-top:12px;padding:10px 12px;background:rgba(16,185,129,0.06);
  border-left:3px solid var(--green);border-radius:0 8px 8px 0;
  font-size:0.81rem;color:var(--muted);line-height:1.6;display:none;}
.qexp.show{display:block;animation:fadeIn 0.25s ease;}
.btn-next{width:100%;margin-top:14px;padding:12px;border:none;border-radius:12px;
  background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;
  font-size:0.88rem;font-weight:600;cursor:pointer;display:none;}
.btn-next.show{display:block;}
/* RESULT */
.rescard{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:22px;text-align:center;margin-top:16px;}
.respct{font-size:3rem;font-weight:700;line-height:1;}
.reslbl{font-size:0.95rem;font-weight:600;margin:5px 0 14px;}
.resrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.rri{background:var(--bg);border-radius:8px;padding:9px;}
.rrv{font-size:1.1rem;font-weight:700;}
.rrl{font-size:0.6rem;color:var(--muted);margin-top:2px;}
.btn-retry{width:100%;padding:12px;border:1px solid var(--border);
  border-radius:12px;background:transparent;color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:0.88rem;cursor:pointer;margin-bottom:8px;}
.btn-home{width:100%;padding:12px;border:none;border-radius:12px;
  background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;
  font-size:0.88rem;font-weight:600;cursor:pointer;}
/* STATS */
.spc{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:8px;}
.sph{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.spd{width:9px;height:9px;border-radius:50%;}
.spn{font-weight:600;font-size:0.85rem;flex:1;}
.spp{font-family:'Fira Mono',monospace;font-size:0.75rem;font-weight:600;}
.spbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.spfill{height:100%;border-radius:3px;}
.sprow{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.spstat{background:var(--bg);border-radius:8px;padding:8px;text-align:center;}
.spsv{font-size:0.95rem;font-weight:700;}
.spsl{font-size:0.58rem;color:var(--muted);margin-top:2px;}
.btn-reset{width:100%;margin-top:14px;padding:11px;
  border:1px solid rgba(239,68,68,0.3);border-radius:12px;
  background:transparent;color:var(--red);
  font-family:'Space Grotesk',sans-serif;font-size:0.83rem;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="topbar-back" id="tbk" onclick="goBack()">←</button>
    <div class="topbar-title" id="ttitle">CMRP Prep</div>
    <div class="topbar-badge" id="tbadge">SMRP BOK</div>
  </div>
  <div class="content">
    <!-- HOME -->
    <div class="screen active" id="sc-home">
      <div class="hero">
        <div class="hero-tag">Certified Maintenance &amp; Reliability Professional</div>
        <h1>Prepárate para el <span>CMRP</span></h1>
        <p>5 pilares · Conceptos profundos · Preguntas tipo examen</p>
      </div>
      <div class="sum-grid">
        <div class="sum-item"><div class="sum-val" id="s-resp">0</div><div class="sum-lbl">Respondidas</div></div>
        <div class="sum-item"><div class="sum-val" style="color:var(--green)" id="s-ok">0</div><div class="sum-lbl">Correctas</div></div>
        <div class="sum-item"><div class="sum-val" style="color:var(--yellow)" id="s-pct">0%</div><div class="sum-lbl">Precisión</div></div>
      </div>
      <div class="sec-label">Pilares del BOK</div>
      <div class="pilar-list" id="pilar-list"></div>
      <button class="btn-main" onclick="examAll()">🎯 Examen Simulado — Todos los Pilares</button>
    </div>
    <!-- PILAR -->
    <div class="screen" id="sc-pilar">
      <div class="mode-tabs" id="mtabs">
        <button class="mode-tab active" id="mt-c" onclick="setMode('c')">📚 Conceptos</button>
        <button class="mode-tab" id="mt-p" onclick="setMode('p')">📝 Practicar</button>
      </div>
      <div id="pcontent"></div>
    </div>
  </div>
  <div class="navbar">
    <div class="nav-item active" id="nv-inicio" onclick="navTo('inicio')"><div class="nav-icon">🏠</div><div class="nav-label">Inicio</div></div>
    <div class="nav-item" id="nv-estudiar" onclick="navTo('estudiar')"><div class="nav-icon">📚</div><div class="nav-label">Estudiar</div></div>
    <div class="nav-item" id="nv-practicar" onclick="navTo('practicar')"><div class="nav-icon">📝</div><div class="nav-label">Practicar</div></div>
    <div class="nav-item" id="nv-stats" onclick="navTo('stats')"><div class="nav-icon">📊</div><div class="nav-label">Progreso</div></div>
  </div>
</div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const CONTENT = {
  pilares: [
    {
      id: 'p1',
      nombre: 'Negocio & Gestión',
      peso: '18%',
      color: '#f0a500',
      desc: 'Cubre la creación y administración de la dirección estratégica de mantenimiento y confiabilidad, la medición del desempeño, la gestión financiera y la comunicación con stakeholders.',
      temas: [
        {
          codigo: '1.1',
          titulo: 'KPIs e Indicadores de Desempeño',
          subtemas: [
            {
              titulo: 'MTBF — Mean Time Between Failures',
              contenido: 'El MTBF es el tiempo promedio entre dos fallas consecutivas de un equipo reparable. Mide directamente la <strong>frecuencia de fallas</strong>: a mayor MTBF, más confiable es el equipo.',
              formula: 'MTBF = Tiempo total de operación ÷ Número de fallas',
              ejemplo: 'Un compresor operó 2,000 horas y presentó 5 fallas.\nMTBF = 2,000 ÷ 5 = <strong>400 horas/falla</strong>\nClase mundial para equipos críticos: MTBF > 2,000 h'
            },
            {
              titulo: 'MTTR — Mean Time To Repair',
              contenido: 'El MTTR es el tiempo promedio que tarda el equipo de mantenimiento en restaurar el equipo a condición operativa después de una falla. Mide la <strong>eficiencia de la respuesta de reparación</strong>.',
              formula: 'MTTR = Tiempo total de reparación ÷ Número de reparaciones',
              ejemplo: 'En 5 fallas, los tiempos de reparación fueron: 2h, 3h, 1h, 4h, 2h.\nTiempo total = 12 horas\nMTTR = 12 ÷ 5 = <strong>2.4 horas/reparación</strong>'
            },
            {
              titulo: 'Disponibilidad (Availability)',
              contenido: 'La Disponibilidad mide el porcentaje del tiempo que un equipo está en condición de operar cuando se requiere. Es el KPI más importante para la gestión de activos productivos.',
              formula: 'A = MTBF ÷ (MTBF + MTTR) × 100%',
              ejemplo: 'MTBF = 400 h, MTTR = 2.4 h\nA = 400 ÷ (400 + 2.4) = 400 ÷ 402.4 = <strong>99.4%</strong>\n\nClase mundial: A > 95% para equipos críticos\nAlternativa: A = (Tiempo disponible ÷ Tiempo total calendario) × 100%'
            },
            {
              titulo: 'OEE — Overall Equipment Effectiveness',
              contenido: 'El OEE (Efectividad Global del Equipo) es el KPI principal del programa TPM. Combina tres dimensiones del desempeño del equipo productivo en un único indicador.',
              formula: 'OEE = Disponibilidad × Rendimiento × Calidad\n\nDisponibilidad = (Tiempo planeado - Paros) ÷ Tiempo planeado\nRendimiento = Producción real ÷ Producción teórica al 100%\nCalidad = Unidades buenas ÷ Unidades totales producidas',
              ejemplo: 'Disponibilidad = 85%, Rendimiento = 92%, Calidad = 98%\nOEE = 0.85 × 0.92 × 0.98 = <strong>76.6%</strong>\n\nClase mundial: OEE ≥ 85%\nDesglose típico clase mundial: D≥90%, R≥95%, C≥99%'
            },
            {
              titulo: 'Schedule Compliance — Cumplimiento del Programa',
              contenido: 'Mide el porcentaje de órdenes de trabajo ejecutadas según lo programado en la semana. Es el termómetro diario/semanal de la eficiencia operativa del departamento.',
              formula: 'SC = (OT ejecutadas según programa ÷ OT programadas) × 100%',
              ejemplo: 'Se programaron 80 OT para la semana.\nSe ejecutaron según programa: 68 OT.\nSC = 68 ÷ 80 = <strong>85%</strong>\n\nClase mundial: SC ≥ 90%\nUn SC bajo indica: falta de materiales, interferencia de producción o mala planificación.'
            },
            {
              titulo: 'PM Compliance — Cumplimiento de PM',
              contenido: 'Mide el porcentaje de mantenimientos preventivos ejecutados a tiempo dentro del período programado. Refleja la disciplina del programa de mantenimiento preventivo.',
              formula: 'PM Compliance = (PM ejecutados a tiempo ÷ PM programados) × 100%',
              ejemplo: 'En el mes se programaron 120 PM.\nSe ejecutaron a tiempo: 108 PM.\nPM Compliance = 108 ÷ 120 = <strong>90%</strong>\n\nClase mundial: PM Compliance ≥ 95%'
            },
            {
              titulo: 'Backlog de Mantenimiento',
              contenido: 'El backlog es el acumulado de trabajo aprobado, planificado y listo para ser ejecutado. Se expresa en semanas de trabajo disponible para el equipo.',
              formula: 'Backlog (semanas) = Horas-hombre pendientes ÷ Capacidad semanal (h-h)',
              ejemplo: 'Trabajo pendiente: 350 horas-hombre\nCapacidad semanal: 200 horas-hombre\nBacklog = 350 ÷ 200 = <strong>1.75 semanas</strong>\n\nRango saludable: 2 a 4 semanas\n• <2 semanas: exceso de capacidad o falta de trabajo preparado\n• >4 semanas: acumulación problemática, posible reactividad'
            },
            {
              titulo: 'Wrench Time — Tiempo Productivo del Técnico',
              contenido: 'El Wrench Time (tiempo de llave) es el porcentaje del tiempo de turno que el técnico pasa ejecutando trabajo físico productivo. Es el indicador de eficiencia del sistema de planificación.',
              formula: 'Wrench Time = Horas de trabajo productivo ÷ Horas totales del turno × 100%',
              ejemplo: 'Técnico con turno de 8 horas. Tiempo en trabajo productivo: 2.8 horas\nWrench Time = 2.8 ÷ 8 = <strong>35%</strong>\n\nMedia de la industria: 25-35%\nClase mundial: >55%\n\nPérdidas típicas del Wrench Time:\n• Esperar materiales no disponibles\n• Desplazamiento al sitio de trabajo\n• Búsqueda de información o planos\n• Reuniones y papeleo\n• Trabajo rehecho (retrabajo)'
            },
            {
              titulo: 'Costo de Mantenimiento / RAV',
              contenido: 'El RAV (Replacement Asset Value) es el costo de reemplazar todos los activos productivos de la planta. El ratio Costo de Mantenimiento/RAV es un KPI financiero clave para el benchmarking.',
              formula: 'Costo M&R / RAV = Costo total anual de mantenimiento ÷ Valor de reemplazo de activos × 100%',
              ejemplo: 'Costo total de mantenimiento anual: $5,000,000\nValor de reemplazo de activos (RAV): $250,000,000\nRatio = 5,000,000 ÷ 250,000,000 = <strong>2.0%</strong> ✓ Clase mundial\n\nReferencia clase mundial: 1% a 3%\n• <1%: posible mantenimiento insuficiente (riesgo de falla)\n• >5%: equipos envejecidos o programa de confiabilidad deficiente'
            }
          ]
        },
        {
          codigo: '1.2',
          titulo: 'Gestión Financiera y LCC',
          subtemas: [

{num:8,pilar:"Confiabilidad del Proceso",text:"En SPC, ¿qué indica que un proceso está 'fuera de control'?",opts:["Que el proceso tiene una capacidad Cp < 1.0", "Un punto fuera de los límites de control (LCS/LCI) o patrones no aleatorios en la carta de control", "Que la variabilidad supera la natural esperada", "Que el proceso produce más de 3.4 defectos por millón"],correct:1,exp:"Proceso fuera de control: puntos fuera de los límites ±3σ, tendencias, patrones cíclicos."},
{num:9,pilar:"Confiabilidad del Proceso",text:"¿Qué es SIL (Safety Integrity Level)?",opts:["System Integration Level", "Safety Integrity Level — nivel de reducción de riesgo de funciones instrumentadas de seguridad", "Standard Industrial Level", "Sequential Instrumentation Logic"],correct:1,exp:"SIL (IEC 61508/61511): SIL 1=10-100×, SIL 2=100-1000×, SIL 3=1000-10000× reducción de riesgo."},
{num:10,pilar:"Confiabilidad del Proceso",text:"¿Cuántos pilares tiene el sistema TPM completo?",opts:["4 pilares", "6 pilares", "8 pilares", "10 pilares"],correct:2,exp:"Los 8 pilares del TPM: Autónomo, Planeado, Mejoras Enfocadas, Educación, Salud/Seguridad, Gestión Temprana, Calidad, TPM Administrativo."},
{num:11,pilar:"Confiabilidad del Proceso",text:"¿Cuál es el primer paso del Mantenimiento Autónomo en TPM?",opts:["Capacitar a los operadores en PdM", "Limpieza inicial profunda del equipo para detectar anomalías", "Transferir toda la responsabilidad de mantenimiento a operaciones", "Comprar equipos de medición para los operadores"],correct:1,exp:"Paso 1 MA: Limpieza inicial. La limpieza ES la inspección: revela fugas, holguras, desgaste. Establece la condición base."},
{num:12,pilar:"Confiabilidad del Proceso",text:"¿Cuál es el KPI principal del programa TPM?",opts:["MTBF y MTTR de los equipos de la línea", "OEE de las líneas de producción", "Número de eventos Kaizen realizados por mes", "Cumplimiento del programa de mantenimiento preventivo"],correct:1,exp:"El OEE es el KPI principal del TPM: integra Disponibilidad, Rendimiento y Calidad. Clase mundial: OEE ≥85%."},
{num:13,pilar:"Confiabilidad del Proceso",text:"SMED busca reducir el tiempo de cambio de formato mediante:",opts:["Eliminar el número de herramientas utilizadas", "Convertir actividades internas (máquina parada) en externas (máquina en marcha)", "Estandarizar los procedimientos en un solo documento", "Eliminar el tiempo de espera de materiales en el almacén"],correct:1,exp:"SMED clasifica actividades en internas y externas. Convertir internas en externas reduce el tiempo de paro."},
{num:14,pilar:"Confiabilidad del Proceso",text:"¿Cuál es el OEE objetivo de clase mundial para manufactura discreta?",opts:["50-60%", "65-75%", "≥85%", "≥95%"],correct:2,exp:"OEE clase mundial para manufactura discreta: ≥85%."},
{num:15,pilar:"Confiabilidad del Proceso",text:"El análisis Bow-Tie conecta:",opts:["El peligro y la consecuencia", "Las causas/amenazas (izquierda) y las consecuencias (derecha), conectadas por el evento de pérdida de control central", "Los modos de falla y los efectos de falla", "Las barreras preventivas y las barreras de mitigación únicamente"],correct:1,exp:"Bow-Tie: izquierda = amenazas + barreras de prevención. Centro = top event. Derecha = consecuencias + barreras de mitigación."},
{num:16,pilar:"Confiabilidad del Proceso",text:"¿Cuál es la secuencia correcta de las 5S?",opts:["Sostener, Clasificar, Ordenar, Limpiar, Estandarizar", "Clasificar (Seiri), Ordenar (Seiton), Limpiar (Seiso), Estandarizar (Seiketsu), Sostener (Shitsuke)", "Ordenar, Clasificar, Estandarizar, Limpiar, Sostener", "Limpiar, Clasificar, Ordenar, Sostener, Estandarizar"],correct:1,exp:"5S: Seiri, Seiton, Seiso, Seiketsu, Shitsuke."},
{num:17,pilar:"Confiabilidad del Proceso",text:"Un proceso con Cp=1.5 y Cpk=0.8 indica:",opts:["El proceso está centrado y tiene buena capacidad", "El proceso tiene buena capacidad potencial pero está descentrado, produciendo defectos fuera de una especificación", "El proceso no tiene capacidad suficiente", "El proceso está centrado pero la variabilidad es demasiado alta"],correct:1,exp:"Cp > Cpk indica descentrado. El proceso tiene el ancho adecuado (Cp=1.5) pero no está centrado correctamente (Cpk=0.8)."},
{num:18,pilar:"Confiabilidad del Proceso",text:"En la jerarquía de controles de riesgo, ¿cuál es el MÁS efectivo?",opts:["Equipos de Protección Personal (EPP)", "Controles administrativos", "Sustitución o eliminación del peligro", "Señalización y advertencias"],correct:2,exp:"De mayor a menor efectividad: Eliminación → Sustitución → Controles de ingeniería → Administrativos → EPP."},
{num:19,pilar:"Confiabilidad del Proceso",text:"¿Cuál es el desperdicio considerado el PEOR en Lean Manufacturing?",opts:["Inventario excesivo", "Sobreproducción — genera todos los demás desperdicios", "Transporte de materiales entre estaciones", "Movimiento innecesario del operador"],correct:1,exp:"Sobreproducción es el peor desperdicio Lean: genera todos los demás."},
{num:20,pilar:"Confiabilidad del Proceso",text:"En un HAZOP, la palabra guía 'MÁS' aplicada al parámetro 'Flujo' genera:",opts:["Flujo inverso", "Flujo cero", "Flujo mayor al diseño", "Flujo de componente equivocado"],correct:2,exp:"HAZOP 'Más': más de la intención de diseño. Aplicado a flujo: flujo alto → posible golpe de ariete, daño a equipos o pérdida de contención."}]},
    {id:'p3',nombre:'Confiabilidad del Equipo',peso:'26%',color:'#00c896',qs:[{num:1,pilar:"Confiabilidad del Equipo",text:"¿Cuál es la PRIMERA pregunta del proceso RCM según SAE JA1011?",opts:["¿Cuáles son las consecuencias de la falla?", "¿Cuáles son las funciones y estándares de desempeño?", "¿Cuáles son los modos de falla?", "¿Qué se puede hacer para prevenir la falla?"],correct:1,exp:"RCM empieza con las funciones y estándares de desempeño."},
{num:2,pilar:"Confiabilidad del Equipo",text:"Distribución Weibull con β < 1 indica:",opts:["Desgaste acelerado", "Vida útil aleatoria", "Mortalidad infantil (fallas por defectos de fabricación o instalación)", "Régimen estable"],correct:2,exp:"β<1: tasa decreciente (mortalidad infantil). β=1: tasa constante. β>1: tasa creciente (desgaste)."},
{num:3,pilar:"Confiabilidad del Equipo",text:"El RPN en FMEA se calcula como:",opts:["Severidad + Ocurrencia + Detección", "Severidad × Ocurrencia × Detección", "(Severidad × Ocurrencia) / Detección", "Severidad × Criticidad"],correct:1,exp:"RPN = S × O × D. Rango 1-1000. Severidad=10 siempre requiere acción independientemente del RPN."},
{num:4,pilar:"Confiabilidad del Equipo",text:"Sistema con R₁=0.90 y R₂=0.85 en serie. Confiabilidad del sistema:",opts:["0.875", "0.765", "0.985", "0.950"],correct:1,exp:"Serie: R = 0.90 × 0.85 = 0.765 (76.5%). En paralelo sería: 1-(0.10×0.15) = 0.985."},
{num:5,pilar:"Confiabilidad del Equipo",text:"La técnica MÁS adecuada para detectar desalineación en un acoplamiento:",opts:["Análisis de aceite", "Análisis de vibraciones", "Termografía infrarroja", "Ultrasonido de contacto"],correct:1,exp:"Desalineación: picos a 1× y 2× RPM predominantemente axiales en el espectro de vibraciones."},
{num:6,pilar:"Confiabilidad del Equipo",text:"Un equipo tiene λ = 0.005 fallas/hora. Probabilidad de operar sin fallar 100 horas:",opts:["50.0%", "60.7%", "40.7%", "80.0%"],correct:1,exp:"R(t) = e^(-0.005×100) = e^(-0.5) ≈ 0.6065 = 60.7%. MTBF = 1/λ = 200 h."},
{num:7,pilar:"Confiabilidad del Equipo",text:"Objetivo PRINCIPAL del RCA:",opts:["Identificar al responsable", "Documentar la falla", "Identificar y eliminar la causa raíz para prevenir recurrencia", "Cuantificar el impacto económico"],correct:2,exp:"El RCA elimina causas raíz físicas, humanas y latentes. No busca culpables sino causas."},
{num:8,pilar:"Confiabilidad del Equipo",text:"Mecanismo de daño MÁS común en rodamientos por lubricación deficiente:",opts:["Pitting (fatiga por picadura)", "Corrosión galvánica", "Desgaste abrasivo por partículas", "Fractura frágil por temperatura"],correct:0,exp:"Lubricación insuficiente → contacto metal-metal → esfuerzos de Hertz → fatiga subsuperficial → pitting."},
{num:9,pilar:"Confiabilidad del Equipo",text:"Pico prominente a 1× RPM en dirección radial indica MÁS frecuentemente:",opts:["Falla en pista interior de rodamiento", "Desbalance de masa en el rotor", "Desalineación angular", "Holgura mecánica"],correct:1,exp:"Desbalance: fuerza centrífuga a exactamente 1× RPM, predominantemente radial."},
{num:10,pilar:"Confiabilidad del Equipo",text:"TAN elevado en el análisis de aceite indica:",opts:["Alta concentración de partículas de desgaste", "Oxidación y degradación del aceite lubricante", "Alta viscosidad por baja temperatura", "Contaminación con agua"],correct:1,exp:"TAN (Total Acid Number) elevado: oxidación del aceite, aditivos agotados, formación de ácidos."},
{num:11,pilar:"Confiabilidad del Equipo",text:"Dos bombas en paralelo, R=0.80 cada una. Confiabilidad del sistema:",opts:["0.80", "0.64", "0.96", "1.00"],correct:2,exp:"Paralelo: R = 1-(1-0.80)(1-0.80) = 1-0.04 = 0.96."},
{num:12,pilar:"Confiabilidad del Equipo",text:"El ultrasonido industrial es especialmente útil para detectar:",opts:["Desbalance en rotores", "Fugas de gas/vapor y arcos eléctricos en equipos energizados", "Temperatura superficial de equipos", "Fatiga de material en estructuras"],correct:1,exp:"Ultrasonido (≥20 kHz): fugas de gas/vapor/aire, arcos eléctricos, descargas parciales."},
{num:13,pilar:"Confiabilidad del Equipo",text:"¿Cuál es el intervalo P-F en RCM?",opts:["La diferencia entre MTBF y MTTR", "El tiempo desde que se detecta la falla potencial (P) hasta que ocurre la falla funcional (F)", "La frecuencia de las tareas de búsqueda de fallas", "El tiempo entre la instalación y la primera falla"],correct:1,exp:"El intervalo P-F define cuánto tiempo hay para detectar y actuar antes de la falla funcional."},
{num:14,pilar:"Confiabilidad del Equipo",text:"Según Nowlan & Heap, ¿qué % de equipos siguen el patrón clásico de la Curva de la Bañera?",opts:["~89%", "~68%", "~11%", "~33%"],correct:2,exp:"Solo ~11% siguen el patrón clásico. El 89% restante sigue otros patrones. Esto fundamenta el RCM."},
{num:15,pilar:"Confiabilidad del Equipo",text:"Run-to-Failure es MÁS apropiado cuando:",opts:["Equipo crítico sin redundancia", "Bomba de lubricación de turbogenerador", "Luminaria no crítica con repuesto disponible", "Válvula de control en línea principal"],correct:2,exp:"Run-to-Failure aplica cuando: no hay consecuencias de seguridad, hay repuesto disponible y el costo de PM supera al de reparación."},
{num:16,pilar:"Confiabilidad del Equipo",text:"FRACAS es un sistema closed-loop que:",opts:["Calcula tasas de falla", "Reporta, analiza y genera acciones correctivas para eliminar fallas recurrentes", "Evalúa causas de accidentes", "Audita sistemas de activos"],correct:1,exp:"FRACAS: reporte → análisis → acción correctiva → verificación de eficacia."},
{num:17,pilar:"Confiabilidad del Equipo",text:"¿Qué representa el parámetro η (eta) de la distribución de Weibull?",opts:["La tasa de falla constante del equipo", "La vida característica: tiempo al cual el 63.2% de la población ha fallado", "El número mínimo de fallas antes del desgaste", "La desviación estándar de los tiempos a la falla"],correct:1,exp:"η (vida característica): tiempo en que el 63.2% de la población falla, independientemente de β."},
{num:18,pilar:"Confiabilidad del Equipo",text:"La termografía infrarroja es MÁS efectiva para detectar:",opts:["Desbalance en rotores", "Puntos calientes en conexiones eléctricas, rodamientos y equipos de proceso", "Cavitación en bombas", "Fisuras internas en estructuras"],correct:1,exp:"Termografía detecta gradientes de temperatura: conexiones sueltas, rodamientos con fricción, intercambiadores, transformadores."},
{num:19,pilar:"Confiabilidad del Equipo",text:"FTA es top-down; FMEA es bottom-up. ¿Cuál es la diferencia?",opts:["FTA es cuantitativo; FMEA es siempre cualitativo", "FTA: del evento no deseado hacia las causas (deductivo); FMEA: de los modos de falla hacia los efectos (inductivo)", "FTA analiza equipos mecánicos; FMEA analiza equipos eléctricos", "FTA lo realiza un experto externo; FMEA el equipo interno"],correct:1,exp:"FTA: deductivo (top-down). FMEA: inductivo (bottom-up). Son complementarios."},
{num:20,pilar:"Confiabilidad del Equipo",text:"Las holguras mecánicas en equipos rotativos se manifiestan en vibraciones como:",opts:["Un único pico a 1× RPM de alta amplitud", "Múltiples armónicos de la frecuencia de rotación (1×, 2×, 3×...) con posibles subarmónicos (0.5×)", "Un pico dominante a la frecuencia natural del sistema", "Ausencia de picos en alta frecuencia"],correct:1,exp:"Holgura: genera señal no lineal → múltiples armónicos de 1× RPM y posibles subarmónicos (0.5×, 1.5×)."},
{num:21,pilar:"Confiabilidad del Equipo",text:"La diferencia entre 'falla funcional' y 'modo de falla' en RCM:",opts:["Son términos intercambiables en RCM", "La falla funcional describe el estado de no cumplir la función (el 'qué'); el modo de falla describe la causa específica de ese estado (el 'por qué')", "El modo de falla es siempre detectable; la falla funcional puede ser oculta", "La falla funcional aplica a sistemas; el modo de falla aplica a componentes"],correct:1,exp:"Falla funcional: 'La bomba no entrega el caudal requerido'. Modo de falla: 'Impeller desgastado' (la causa)."},
{num:22,pilar:"Confiabilidad del Equipo",text:"¿Cuántos patrones de falla identifica el estudio de Nowlan & Heap?",opts:["2 patrones", "4 patrones", "6 patrones", "8 patrones"],correct:2,exp:"Nowlan & Heap identificaron 6 patrones de falla (A-F). Solo A y B se benefician del PM por tiempo."},
{num:23,pilar:"Confiabilidad del Equipo",text:"El balanceo dinámico se diferencia del estático en que:",opts:["El balanceo dinámico es menos preciso pero más rápido", "El balanceo dinámico corrige el desequilibrio en dos planos, eliminando el desequilibrio estático y el dinámico (par)", "El balanceo estático aplica a rotores largos y el dinámico a discos delgados", "No hay diferencia práctica entre ambos"],correct:1,exp:"Balanceo estático: un plano. Balanceo dinámico: dos planos (par dinámico). Rotores con L/D > 0.5 requieren balanceo dinámico."},
{num:24,pilar:"Confiabilidad del Equipo",text:"¿Cuál técnica de END es MÁS apropiada para detectar fisuras superficiales en materiales ferromagnéticos?",opts:["Ultrasonido de pulso-eco", "Partículas magnéticas (MT)", "Radiografía industrial", "Termografía infrarroja"],correct:1,exp:"Partículas magnéticas (MT): el campo magnético hace que las partículas se acumulen en fisuras superficiales en materiales ferromagnéticos."},
{num:25,pilar:"Confiabilidad del Equipo",text:"En RCM, consecuencias de seguridad/ambientales inaceptables:",opts:["Se tratan igual que cualquier otro modo de falla", "Requieren una tarea proactiva que las reduzca a un nivel tolerable; si no existe, se debe rediseñar", "Se eliminan del análisis si la probabilidad de falla es muy baja", "Solo requieren atención si han ocurrido antes"],correct:1,exp:"RCM: consecuencias inaceptables de seguridad/ambiente SIEMPRE requieren una tarea que las reduzca a nivel tolerable."}]},
    {id:'p4',nombre:'Organización & Liderazgo',peso:'16%',color:'#c47aff',qs:[{num:1,pilar:"Organización & Liderazgo",text:"El modelo ADKAR: ¿qué representa la 'R'?",opts:["Resultados — medir los resultados del cambio", "Reforzamiento — sostener y reforzar el cambio para prevenir regresión", "Responsabilidad — asignar responsables del cambio", "Recursos — asegurar los recursos necesarios"],correct:1,exp:"ADKAR = Awareness, Desire, Knowledge, Ability, Reinforcement. Si el reforzamiento falla, la organización regresa a los viejos hábitos."},
{num:2,pilar:"Organización & Liderazgo",text:"El supervisor tiene equipo con alta habilidad técnica pero baja motivación. ¿Qué estilo adoptar? (Hersey & Blanchard)",opts:["Estilo Directivo (S1) — instrucciones detalladas", "Estilo Coach (S2) — explicar y persuadir con acompañamiento", "Estilo de Apoyo (S3) — apoyar, involucrar y facilitar", "Estilo Delegador (S4) — delegar sin supervisión"],correct:2,exp:"M3 (alta competencia, baja motivación) → S3 (Supporting): alta conducta de apoyo, baja directiva."},
{num:3,pilar:"Organización & Liderazgo",text:"El Gap Analysis de competencias sirve para:",opts:["Comparar el salario del personal con el mercado laboral", "Identificar la diferencia entre las competencias actuales del personal y las requeridas para el desempeño deseado", "Evaluar el desempeño individual anual del técnico", "Determinar cuántos técnicos adicionales se deben contratar"],correct:1,exp:"Gap Analysis: competencias requeridas vs competencias actuales. Las brechas generan el Plan de Capacitación priorizado."},
{num:4,pilar:"Organización & Liderazgo",text:"La transferencia de conocimiento es un desafío crítico en M&R principalmente porque:",opts:["Los CMMS no almacenan conocimiento técnico informal", "El conocimiento tácito de técnicos experimentados se pierde con jubilaciones y rotación si no se documenta", "Los ingenieros jóvenes no tienen interés en aprender", "Los presupuestos de capacitación son insuficientes"],correct:1,exp:"El conocimiento tácito acumulado por experiencia es el activo más valioso y frágil."},
{num:5,pilar:"Organización & Liderazgo",text:"Los primeros dos pasos del modelo de cambio de Kotter son:",opts:["Establecer el equipo de cambio y diseñar el plan", "Crear urgencia y construir una coalición de líderes guiadores", "Comunicar la visión y eliminar los obstáculos", "Generar victorias a corto plazo y consolidar el cambio"],correct:1,exp:"Kotter: 1) Crear urgencia, 2) Coalición de líderes, 3) Visión y estrategia, 4) Comunicar la visión..."},
{num:6,pilar:"Organización & Liderazgo",text:"¿Cuál comportamiento refleja una verdadera 'cultura de confiabilidad'?",opts:["Los técnicos solo ejecutan el trabajo en la OT sin reportar anomalías adicionales", "Todos los niveles identifican y actúan sobre riesgos de falla proactivamente", "Solo el departamento de mantenimiento es responsable de la confiabilidad", "La cultura de confiabilidad es un programa que se implementa y luego se mantiene automáticamente"],correct:1,exp:"Cultura de confiabilidad: responsabilidad compartida en todos los niveles, pensamiento proactivo y mejora continua sostenida."},
{num:7,pilar:"Organización & Liderazgo",text:"¿Cuál es la diferencia entre 'mentoring' y 'coaching'?",opts:["Son términos intercambiables sin diferencia práctica", "Mentoring: relación a largo plazo donde un profesional experimentado comparte experiencia y conocimiento tácito. Coaching: proceso focalizado en desarrollar una competencia específica en el corto plazo", "Mentoring es para gerentes; coaching es para técnicos", "Mentoring lo realiza el supervisor directo; coaching lo realiza un consultor externo"],correct:1,exp:"Mentoring: largo plazo, transferencia de experiencia y sabiduría. Coaching: corto plazo, focalizado en una competencia específica."},
{num:8,pilar:"Organización & Liderazgo",text:"¿Cuál es la función más importante del líder de un departamento clase mundial?",opts:["Ser el experto técnico más competente del departamento", "Crear las condiciones (visión, recursos, cultura, procesos) para que el equipo pueda alcanzar los resultados de confiabilidad requeridos", "Aprobar personalmente todas las OT de alto costo", "Negociar el presupuesto de mantenimiento con la gerencia financiera cada año"],correct:1,exp:"El líder clase mundial no es el mejor técnico sino el que crea las condiciones organizacionales para que el equipo tenga éxito."},
{num:9,pilar:"Organización & Liderazgo",text:"¿Cuál es la visión más avanzada del rol del mantenimiento en una organización clase mundial?",opts:["Mantenimiento es un centro de costo que debe minimizar gastos", "Mantenimiento es un servicio de soporte que repara lo que se rompe", "Mantenimiento es un habilitador estratégico que gestiona activos para maximizar el valor para el negocio", "Mantenimiento es un departamento técnico independiente de los objetivos del negocio"],correct:2,exp:"Clase mundial: mantenimiento como habilitador estratégico que gestiona activos a lo largo de su ciclo de vida."},
{num:10,pilar:"Organización & Liderazgo",text:"La causa más frecuente de resistencia al cambio en programas de confiabilidad:",opts:["La falta de tecnología adecuada", "El miedo a perder el empleo, la falta de comprensión de los beneficios del cambio y la percepción de amenaza a los hábitos establecidos", "La falta de presupuesto", "Los empleados no tienen suficiente capacitación técnica"],correct:1,exp:"La resistencia al cambio es mayoritariamente emocional: miedo al fracaso, a perder el control, al cambio de rutinas."},
{num:11,pilar:"Organización & Liderazgo",text:"Competencia = _____ según el modelo KSA:",opts:["Conocimiento + Salario + Actitud", "Conocimiento + Habilidades + Actitudes", "Conocimiento + Supervisión + Aptitud", "Capacitación + Habilidades + Actitudes"],correct:1,exp:"Competencia = Conocimiento (saber) + Habilidades (poder hacer) + Actitudes (querer hacer)."},
{num:12,pilar:"Organización & Liderazgo",text:"El mayor desafío al implementar el Mantenimiento Autónomo (MA) en una planta tradicional:",opts:["El costo de capacitar a todos los operadores", "La resistencia cultural ('eso no es mi trabajo' / 'ellos van a dañar mis equipos')", "La falta de herramientas adecuadas para los operadores", "Las restricciones sindicales"],correct:1,exp:"El mayor desafío del MA es cultural: cambiar la mentalidad de 'yo opero, tú mantienes' a 'compartimos la responsabilidad del equipo'."},
{num:13,pilar:"Organización & Liderazgo",text:"¿Cuál es el indicador de cultura de seguridad de mayor valor predictivo de accidentes futuros?",opts:["La tasa de frecuencia de accidentes (TRIR) del año anterior", "La tasa de reporte de near-miss: una alta tasa indica una cultura de transparencia que identifica y elimina peligros antes de que se conviertan en accidentes", "El número de multas y sanciones de los organismos de control", "El costo de los accidentes laborales como % del presupuesto"],correct:1,exp:"Near-miss reporting rate: leading indicator más valioso. Una cultura que reporta los cuasi-accidentes previene los accidentes graves."},
{num:14,pilar:"Organización & Liderazgo",text:"¿Cuál estructura organizacional es más adecuada para una planta con múltiples líneas de producción?",opts:["Mantenimiento completamente descentralizado", "Estructura híbrida: equipos dedicados a cada línea con un grupo centralizado de especialistas compartidos", "Mantenimiento completamente centralizado", "Tercerización completa del mantenimiento a un contratista único"],correct:1,exp:"La estructura híbrida combina lo mejor de la centralización (especialistas, economías de escala) y la descentralización (conocimiento del equipo, respuesta rápida)."},
{num:15,pilar:"Organización & Liderazgo",text:"¿Cuál es el elemento cultural más importante para que un programa de mejora continua sea sostenible?",opts:["La inversión en la tecnología de mantenimiento más avanzada disponible", "El compromiso demostrado de la alta dirección, reflejado en la asignación de recursos, la participación activa y el reconocimiento de los logros del personal", "La contratación de consultores externos especializados que guíen el programa continuamente", "La certificación formal de todos los líderes del programa en metodologías Lean y Six Sigma"],correct:1,exp:"El compromiso de la alta dirección es el factor más crítico para la sostenibilidad de cualquier programa de mejora continua."}]},
    {id:'p5',nombre:'Gestión del Trabajo',peso:'24%',color:'#ff6b6b',qs:[{num:1,pilar:"Gestión del Trabajo",text:"¿Cuál es la responsabilidad PRINCIPAL del Planificador de Mantenimiento?",opts:["Ejecutar directamente los trabajos de mayor complejidad", "Preparar paquetes de trabajo completos para que los técnicos ejecuten eficientemente", "Programar las OT en coordinación con producción", "Supervisar al personal durante la ejecución"],correct:1,exp:"El planificador prepara el trabajo ANTES de que ocurra: pasos, estimación de horas, BOM, herramientas especiales, planos y procedimientos."},

// ── STATE ─────────────────────────────────────────────────────────────────────
let ST = JSON.parse(localStorage.getItem('cmrp3') || '{}');
function save(){ localStorage.setItem('cmrp3', JSON.stringify(ST)); }
let curPid = null, curMode = 'c', quiz = {}, navStack = [];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function gps(pid){
  const p = DB.pilares.find(x=>x.id===pid);
  const ps = ST[pid]||{};
  const keys = Object.keys(ps.a||{});
  return {answered:keys.length, correct:keys.filter(k=>ps.a[k]).length, total:p?p.qs.length:0};
}
function gas(){
  let a=0,c=0,t=0;
  DB.pilares.forEach(p=>{const s=gps(p.id);a+=s.answered;c+=s.correct;t+=s.total;});
  return {answered:a,correct:c,total:t};
}
function showSc(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+id).classList.add('active');
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  const gs=gas();
  document.getElementById('s-resp').textContent=gs.answered;
  document.getElementById('s-ok').textContent=gs.correct;
  document.getElementById('s-pct').textContent=(gs.answered>0?Math.round(gs.correct/gs.answered*100):0)+'%';
  const cp = CONTENT.pilares;
  document.getElementById('pilar-list').innerHTML = cp.map(p=>{
    const dbp=DB.pilares.find(x=>x.id===p.id)||{qs:[]};
    const st=gps(p.id);
    const prec=st.answered>0?Math.round(st.correct/st.answered*100):0;
    const prog=Math.round(st.answered/Math.max(dbp.qs.length,1)*100);
    return `<div class="pc" style="--color:${p.color}" onclick="openPilar('${p.id}')">
      <div class="pc-info"><div class="pc-name">${p.nombre}</div>
      <div class="pc-meta">${p.peso} del examen · ${dbp.qs.length} preguntas</div></div>
      <div class="pc-right"><div class="pc-pct" style="color:${p.color}">${prec}%</div>
      <div class="mbar"><div class="mbar-fill" style="width:${prog}%;background:${p.color}"></div></div></div>
    </div>`;
  }).join('');
}

// ── OPEN PILAR ────────────────────────────────────────────────────────────────
function openPilar(pid, mode){
  curPid=pid; curMode=mode||'c';
  navStack.push({type:'pilar',pid,mode:curMode});
  const p=CONTENT.pilares.find(x=>x.id===pid);
  document.getElementById('ttitle').textContent=p.nombre;
  document.getElementById('tbk').style.display='block';
  document.getElementById('tbadge').style.display='none';
  document.getElementById('mtabs').style.display='flex';
  showSc('pilar');
  updateTabs(); renderMode();
}

function setMode(m){ curMode=m; updateTabs(); renderMode(); }
function updateTabs(){
  document.getElementById('mt-c').classList.toggle('active',curMode==='c');
  document.getElementById('mt-p').classList.toggle('active',curMode==='p');
}
function renderMode(){ curMode==='c'?renderConceptos():renderPracMenu(); }

// ── BACK ──────────────────────────────────────────────────────────────────────
function goBack(){
  navStack.pop();
  if(navStack.length===0){
    document.getElementById('ttitle').textContent='CMRP Prep';
    document.getElementById('tbk').style.display='none';
    document.getElementById('tbadge').style.display='';
    showSc('home'); renderHome();
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('nv-inicio').classList.add('active');
  } else {
    const last=navStack[navStack.length-1];
    navStack.pop();
    openPilar(last.pid, last.mode||'c');
  }
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function navTo(dest){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nv-'+dest).classList.add('active');
  navStack=[];
  document.getElementById('tbk').style.display='none';
  document.getElementById('tbadge').style.display='';
  document.getElementById('mtabs').style.display='none';
  if(dest==='inicio'){
    document.getElementById('ttitle').textContent='CMRP Prep';
    showSc('home'); renderHome();
  } else if(dest==='estudiar'){
    document.getElementById('ttitle').textContent='Estudiar';
    document.getElementById('mtabs').style.display='none';
    document.getElementById('pcontent').innerHTML = buildMenu('c');
    showSc('pilar');
  } else if(dest==='practicar'){
    document.getElementById('ttitle').textContent='Practicar';
    document.getElementById('pcontent').innerHTML = buildMenu('p');
    showSc('pilar');
  } else if(dest==='stats'){
    document.getElementById('ttitle').textContent='Mi Progreso';
    document.getElementById('pcontent').innerHTML = buildStats();
    showSc('pilar');
  }
}

function buildMenu(mode){
  const icon=mode==='c'?'📚':'📝';
  return `<div class="sec-label">${mode==='c'?'Explorar conceptos':'Practicar preguntas'}</div>
    <div class="menu-list">${CONTENT.pilares.map(p=>{
      const dbp=DB.pilares.find(x=>x.id===p.id)||{qs:[]};
      return `<div class="mc" style="--color:${p.color}" onclick="openPilar('${p.id}','${mode}');document.getElementById('mtabs').style.display='flex'">
        <div class="mc-dot"></div>
        <div class="mc-info"><div class="mc-name">${p.nombre}</div>
        <div class="mc-sub">${p.peso} · ${dbp.qs.length} preguntas</div></div>
        <span style="color:var(--muted);font-size:0.8rem;">${icon} ›</span>
      </div>`;
    }).join('')}</div>`;
}

function tT(i){document.getElementById('tema'+i).classList.toggle('open');}
function tS(ti,si){document.getElementById('sub'+ti+'_'+si).classList.toggle('open');}

// ── PRÁCTICA ──────────────────────────────────────────────────────────────────
function renderPracMenu(){
  const p=CONTENT.pilares.find(x=>x.id===curPid);
  const dbp=DB.pilares.find(x=>x.id===curPid)||{qs:[]};
  const st=gps(curPid);
  const prec=st.answered>0?Math.round(st.correct/st.answered*100):0;
  document.getElementById('pcontent').innerHTML=`
    <div class="ph">
      <div class="ph-tag">Pilar · ${p.peso} del examen</div>
      <div class="ph-title">${p.nombre}</div>
    </div>
    <div class="sum-grid">
      <div class="sum-item"><div class="sum-val">${st.answered}</div><div class="sum-lbl">Respondidas</div></div>
      <div class="sum-item"><div class="sum-val" style="color:var(--green)">${st.correct}</div><div class="sum-lbl">Correctas</div></div>
      <div class="sum-item"><div class="sum-val" style="color:var(--yellow)">${prec}%</div><div class="sum-lbl">Precisión</div></div>
    </div>
    <button class="btn-main" onclick="startQuiz('${curPid}',false)" style="margin-top:0;">▶ Iniciar Práctica (${dbp.qs.length} preguntas)</button>
    <button class="btn-main" onclick="startQuiz('${curPid}',true)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);margin-top:8px;">🔁 Solo preguntas fallidas</button>`;
}

function startQuiz(pid, failedOnly){
  const dbp=DB.pilares.find(x=>x.id===pid);
  let qs=[...dbp.qs];
  if(failedOnly){
    const ps=ST[pid]||{};
    const failed=Object.keys(ps.a||{}).filter(k=>!ps.a[k]);
    if(!failed.length){alert('¡No tienes preguntas fallidas en este pilar!');return;}
    qs=failed.map(k=>dbp.qs[parseInt(k)]).filter(Boolean);
  }
  quiz={pid,qs:qs.sort(()=>Math.random()-0.5),idx:0,correct:0,answered:0};
  renderQ();
}

function examAll(){
  let all=[];
  DB.pilares.forEach(p=>{
    const n=Math.max(3,Math.round(p.qs.length*0.4));
    all=all.concat([...p.qs].sort(()=>Math.random()-0.5).slice(0,n));
  });
  quiz={pid:'all',qs:all.sort(()=>Math.random()-0.5),idx:0,correct:0,answered:0};
  curPid='all'; curMode='p';
  document.getElementById('ttitle').textContent='Examen Simulado';
  document.getElementById('tbk').style.display='block';
  document.getElementById('tbadge').style.display='none';
  document.getElementById('mtabs').style.display='none';
  navStack=[{type:'pilar',pid:'all',mode:'p'}];
  showSc('pilar');
  renderQ();
}

function renderQ(){
  if(quiz.idx>=quiz.qs.length){renderResult();return;}
  const q=quiz.qs[quiz.idx];
  const pct=Math.round(quiz.idx/quiz.qs.length*100);
  document.getElementById('pcontent').innerHTML=`
    <div class="qhdr">
      <button class="btn-bk" onclick="goBack()">← Salir</button>
      <div class="qpw">
        <div class="qbar"><div class="qbar-fill" style="width:${pct}%"></div></div>
        <div class="qcnt">${quiz.idx+1}/${quiz.qs.length} · ✓${quiz.correct}</div>
      </div>
    </div>
    <div class="qtag">${q.pilar}</div>
    <div class="qtext">${q.text}</div>
    <div class="qopts" id="qopts">
      ${q.opts.map((o,i)=>`<div class="qopt" id="op${i}" onclick="pickOpt(${i},${q.correct})">
        <span class="ol">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}
    </div>
    <div class="qexp" id="qexp">${q.exp}</div>
    <button class="btn-next" id="bnext" onclick="nextQ()">Siguiente →</button>`;
}

function pickOpt(sel,correct){
  document.querySelectorAll('.qopt').forEach(o=>{o.classList.add('dis');o.onclick=null;});
  const ok=sel===correct;
  document.getElementById('op'+sel).classList.add(ok?'ok':'fail');
  if(!ok) document.getElementById('op'+correct).classList.add('rev');
  document.getElementById('qexp').classList.add('show');
  document.getElementById('bnext').classList.add('show');
  quiz.answered++; if(ok) quiz.correct++;
  if(quiz.pid!=='all'){
    if(!ST[quiz.pid]) ST[quiz.pid]={a:{}};
    if(!ST[quiz.pid].a) ST[quiz.pid].a={};
    const ri=DB.pilares.find(x=>x.id===quiz.pid)?.qs.indexOf(quiz.qs[quiz.idx]);
    if(ri>=0){ST[quiz.pid].a[ri]=ok; save();}
  }
}
function nextQ(){quiz.idx++;renderQ();}

function renderResult(){
  const pct=quiz.answered>0?Math.round(quiz.correct/quiz.answered*100):0;
  const pass=pct>=70;
  document.getElementById('pcontent').innerHTML=`
    <div class="rescard">
      <div class="respct" style="color:${pass?'var(--green)':'var(--red)'}">${pct}%</div>
      <div class="reslbl" style="color:${pass?'var(--green)':'var(--red)'}">${pass?'✓ ¡Aprobado!':'✗ Sigue practicando'}</div>
      <div class="resrow">
        <div class="rri"><div class="rrv" style="color:var(--green)">${quiz.correct}</div><div class="rrl">Correctas</div></div>
        <div class="rri"><div class="rrv" style="color:var(--red)">${quiz.answered-quiz.correct}</div><div class="rrl">Incorrectas</div></div>
        <div class="rri"><div class="rrv">${quiz.answered}</div><div class="rrl">Total</div></div>
      </div>
      <button class="btn-retry" onclick="startQuiz('${quiz.pid}',false)">↺ Repetir</button>
      <button class="btn-home" onclick="goBack()">← Volver</button>
    </div>`;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function buildStats(){
  return DB.pilares.map(p=>{
    const cp=CONTENT.pilares.find(x=>x.id===p.id)||{color:'#888',nombre:p.id};
    const st=gps(p.id);
    const pct=st.answered>0?Math.round(st.correct/st.answered*100):0;
    const prog=Math.round(st.answered/Math.max(p.qs.length,1)*100);
    return `<div class="spc">
      <div class="sph"><div class="spd" style="background:${cp.color}"></div>
      <div class="spn">${cp.nombre}</div>
      <div class="spp" style="color:${cp.color}">${pct}%</div></div>
      <div class="spbar"><div class="spfill" style="width:${prog}%;background:${cp.color}"></div></div>
      <div class="sprow">
        <div class="spstat"><div class="spsv">${st.answered}</div><div class="spsl">Respondidas</div></div>
        <div class="spstat"><div class="spsv" style="color:var(--green)">${st.correct}</div><div class="spsl">Correctas</div></div>
        <div class="spstat"><div class="spsv">${p.qs.length}</div><div class="spsl">Total</div></div>
      </div>
    </div>`;
  }).join('')+`<button class="btn-reset" onclick="resetAll()">🗑 Reiniciar estadísticas</button>`;
}
function resetAll(){
  if(confirm('¿Reiniciar todas las estadísticas?')){
    localStorage.removeItem('cmrp3');ST={};navTo('stats');
  }
}

renderHome();
